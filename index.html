<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Me</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  overflow-x: hidden;
}

.background {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
  background: radial-gradient(circle at 20% 20%, #1a1a1a, transparent 40%),
              radial-gradient(circle at 80% 80%, #1a1a1a, transparent 40%),
              #0a0a0a;
  animation: moveBg 12s linear infinite;
}

@keyframes moveBg {
  0% { background-position: 0% 0%, 100% 100%; }
  50% { background-position: 100% 0%, 0% 100%; }
  100% { background-position: 0% 0%, 100% 100%; }
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.04);
  border-radius: 20px;
  padding: 25px;
  margin: 25px 0;
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 10px 30px rgba(255,255,255,0.15);
}

.pfp {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  border: 3px solid white;
  margin-bottom: 15px;
  transition: transform 0.4s ease;
}

.pfp:hover {
  transform: scale(1.1) rotate(3deg);
}

h1, h2 {
  margin: 10px 0;
}

.button {
  display: inline-block;
  margin: 10px;
  padding: 12px 22px;
  border-radius: 12px;
  background: transparent;
  color: white;
  text-decoration: none;
  border: 1px solid white;
  position: relative;
  overflow: hidden;
  transition: color 0.3s ease, transform 0.2s ease;
}

.button::before {
  content: "";
  position: absolute;
  width: 0%;
  height: 100%;
  top: 0;
  left: 0;
  background: white;
  transition: width 0.3s ease;
  z-index: -1;
}

.button:hover::before {
  width: 100%;
}

.button:hover {
  color: black;
  transform: translateY(-3px);
}

.toggle {
  position: fixed;
  top: 15px;
  right: 15px;
  padding: 10px 18px;
  border-radius: 10px;
  border: 1px solid white;
  background: transparent;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.toggle:hover {
  background: white;
  color: black;
}

.no-anim .background {
  animation: none;
  background: #3a3a3a;
}

.no-anim .card,
.no-anim .pfp,
.no-anim .button {
  transition: none;
}

.fade {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.8s forwards;
}

.fade:nth-child(1) { animation-delay: 0.2s; }
.fade:nth-child(2) { animation-delay: 0.4s; }
.fade:nth-child(3) { animation-delay: 0.6s; }

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>
<body>
<div class="background"></div>

<button class="toggle" onclick="toggleAnim()">Toggle Animations</button>

<div class="container">

<div class="card fade">
<img src="pfp.jpg" class="pfp">
<h1>devuserr</h1>
<p>User ID: 1473717217186287790</p>
<p>Joined: February 18, 2026</p>
</div>

<div class="card fade">
<h2>Server Info</h2>
<p>BGS: QA Tester</p>
<a class="button" href="https://discord.gg/bgs" target="_blank">Join BGS</a>

<p>California State Prison: Lead Developer</p>
<p>Invite: Private</p>
</div>

<div class="card fade">
<h2>I am a Roblox developer and a Discord bot developer.</h2>
<p>DM if you need me to create anything.</p>
</div>

</div>

<script>
function toggleAnim() {
  document.body.classList.toggle("no-anim");
}
</script>

</body>
</html>
